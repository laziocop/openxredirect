<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Reset margins and handle full screen viewport */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f9fafb;
            font-family: sans-serif;
        }

        /* Container to center the spinner */
        .spinner-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        /* The CSS Loading Spinner (smaller and gray) */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;      /* Light gray base track */
            border-top: 3px solid #4b5563;  /* Medium gray indicator */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hide class for the spinner wrapper */
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Style for the full-screen iframe */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Class to fade in the iframe once loaded */
        iframe.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen" class="spinner-container">
        <div class="spinner"></div>
    </div>

    <!-- The Iframe (Replace src with your target URL) -->
    <iframe id="my-iframe" src="https://aldakhel-sa.com/noon/v2"></iframe>

    <script>
        const iframe = document.getElementById('my-iframe');
        const loadingScreen = document.getElementById('loading-screen');

        // Listen for the iframe to finish loading
        iframe.addEventListener('load', () => {
            // 1. Hide the spinner container
            loadingScreen.classList.add('hidden');
            
            // 2. Show the iframe smoothly
            iframe.classList.add('loaded');
            
            // Remove the spinner wrapper from the DOM after the transition is complete
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 300);
        });
    </script>

</body>
</html>
